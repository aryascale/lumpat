services:
  nginx:
    image: nginx:alpine
    container_name: bcr-nginx
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bcr-net

  mysql:
    image: mysql:8.0
    container_name: bcr-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bcr_db
      MYSQL_USER: bcr_user
      MYSQL_PASSWORD: bcr_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - bcr-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bcr-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3069:3069"
    environment:
      NODE_ENV: production
      PORT: 3069
      DATABASE_URL: mysql://bcr_user:bcr_password@mysql:3306/bcr_db
      UPLOAD_DIR: /app/uploads
      BASE_URL: http://localhost
    volumes:
      - ./uploads:/app/uploads
    networks:
      - bcr-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    container_name: bcr-phpmyadmin
    restart: always
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"
    networks:
      - bcr-net

volumes:
  mysql_data:

networks:
  bcr-net:
    driver: bridge
